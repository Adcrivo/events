---
# Ensure parent directory exists
- name: Ensure app directory exists
  ansible.builtin.file:
    path: "{{ app_dir | dirname }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

# Clone or update events repository
- name: Clone or update events repository
  ansible.builtin.git:
    repo: "{{ git_repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ git_branch }}"
    force: true
    accept_hostkey: true
  become_user: "{{ app_user }}"

# Install dependencies for events service
- name: Install dependencies for events service
  community.general.npm:
    path: "{{ app_dir }}"
    state: present
  become_user: "{{ app_user }}"

# Run Prisma Generate (local schema)
- name: Run Prisma Generate
  ansible.builtin.command: npm run generate
  args:
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"

# Build events service
- name: Build events service
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"

# PM2 Management
- name: Check if PM2 process exists
  ansible.builtin.shell: "pm2 describe {{ pm2_app_name }} > /dev/null 2>&1"
  register: pm2_check
  changed_when: false
  failed_when: false
  become_user: "{{ app_user }}"

- name: Start events service with PM2 (first deploy)
  ansible.builtin.shell: "NODE_ENV={{ app_env }} pm2 start ecosystem.config.js"
  args:
    chdir: "{{ app_dir }}"
  when: pm2_check.rc != 0
  become_user: "{{ app_user }}"

- name: Restart events service with PM2 (subsequent deploys)
  ansible.builtin.shell: "NODE_ENV={{ app_env }} pm2 restart {{ pm2_app_name }} --update-env"
  when: pm2_check.rc == 0
  become_user: "{{ app_user }}"

- name: Save PM2 process list
  ansible.builtin.command: pm2 save
  become_user: "{{ app_user }}"

- name: Setup PM2 startup on boot
  ansible.builtin.command: "pm2 startup systemd -u {{ app_user }} --hp /home/{{ app_user }}"
  args:
    creates: "/etc/systemd/system/pm2-{{ app_user }}.service"
  become: true

