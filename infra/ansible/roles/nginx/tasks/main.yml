---
- name: Install Nginx and Certbot
  ansible.builtin.apt:
    name:
      - nginx
      - certbot
      - python3-certbot-nginx
    state: present

- name: Deploy Nginx site config
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/events
    mode: '0644'
  notify: Reload Nginx

- name: Enable Nginx config
  ansible.builtin.file:
    src: /etc/nginx/sites-available/events
    dest: /etc/nginx/sites-enabled/events
    state: link
  notify: Reload Nginx

- name: Remove default nginx config
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload Nginx

- name: Check if SSL certificate exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ events_domain }}/fullchain.pem"
  register: ssl_cert

- name: Obtain or Reinstall SSL certificate
  ansible.builtin.command: >
    certbot --nginx
    -d {{ events_domain }}
    --non-interactive
    --agree-tos
    --email adcrivo@gmail.com
    --redirect
    --reinstall
  when: not ssl_cert.stat.exists
  notify: Reload Nginx

