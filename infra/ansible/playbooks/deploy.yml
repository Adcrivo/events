---
- name: Deploy Events Service
  hosts: all
  become: true
  roles:
    - app

  post_tasks:
    - name: Wait for application to start
      ansible.builtin.uri:
        url: "http://localhost:8080/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 10
      delay: 5

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "✅ Events Service deployed"
          - "Directory: {{ app_dir }}"
          - "Port: 8080"
          - "Health: PASSED"
          - "URL: https://{{ events_domain }}"

